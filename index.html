<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Group Idea Board</h1>
        <div class="input-section">
            <input type="text" id="userName" placeholder="Your Name" required>
            <input type="text" id="userIdea" placeholder="Share your idea..." required>
            <button id="postButton">Post Idea</button>
        </div>
        <div class="board-section">
            <h2>Board</h2>
            <div id="ideasDisplay" class="ideas-container">
                <!-- Ideas will be displayed here -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
